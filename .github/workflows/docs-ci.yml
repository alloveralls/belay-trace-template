name: docs-ci

on:
  pull_request:
  push:
    paths:
      - README.md
      - SETUP.md
      - AGENTS.md
      - DESIGN.md
      - TRACE_GUIDE.md
      - ".github/*.md"
      - ".github/**/*.md"
      - ".shared/skills/**/*.md"
      - ".agents/skills/belay-trace/SKILL.md"
      - ".belay/agent/**/*.md"
      - ".github/.markdownlint.json"
      - ".github/.typos.toml"
      - ".github/workflows/docs-ci.yml"

jobs:
  markdownlint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: .github/.markdownlint.json
          globs: |
            README.md
            SETUP.md
            AGENTS.md
            DESIGN.md
            TRACE_GUIDE.md
            .github/*.md
            .github/**/*.md
            .shared/skills/**/*.md
            .agents/skills/belay-trace/SKILL.md
            .belay/agent/**/*.md

  typos:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.47.0
        with:
          config: .github/.typos.toml
          files: |
            README.md
            SETUP.md
            AGENTS.md
            DESIGN.md
            TRACE_GUIDE.md
            .github/*.md
            .shared/skills/**/*.md
            .agents/skills/belay-trace/SKILL.md
            .belay/agent/**/*.md
